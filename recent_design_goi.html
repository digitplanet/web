<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recent Designs for GOI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .portfolio {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            display: block;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #111;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <h1>Recent Designs for GOI</h1>
</header>

<section class="portfolio">

    <div class="card">
        <img src="1.png" alt="Design 1">
    </div>

    <div class="card">
        <img src="2.png" alt="Design 2">
    </div>

    <div class="card">
        <img src="3.png" alt="Design 3">
    </div>

    <div class="card">
        <img src="4.png" alt="Design 4">
    </div>

    <div class="card">
        <img src="5.png" alt="Design 5">
    </div>

    <div class="card">
        <img src="6.png" alt="">
    </div>

</section>

<footer>
    © 2026
</footer>

</body>
</html>
